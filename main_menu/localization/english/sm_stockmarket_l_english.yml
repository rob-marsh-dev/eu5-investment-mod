 # --- Invest: Agriculture ---
 sm_buy_agriculture_stake: "Invest in Agriculture"
 dip_sm_buy_agriculture_stake_CATEGORY: "CATEGORY_ECONOMY_ACTIONS"
 sm_buy_agriculture_stake_act: "Purchase a 10% concession in the farms and estates of [SCOPE.sCountry('recipient').GetName]"
 sm_buy_agriculture_stake_desc: "We offer gold — paid directly into their treasury — for a tithe on the harvests of [SCOPE.sCountry('recipient').GetName]. Each investment secures one tenth of the sector; the concession pays us monthly returns from their coffers, and is ours until liquidated... or seized."
 sm_buy_agriculture_stake_effect_text: "[SCOPE.sCountry('actor').GetName] invested in the agriculture of [SCOPE.sCountry('recipient').GetName]."
